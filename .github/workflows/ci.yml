name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Contract tests
        run: |
          cargo test --manifest-path poll_contract/Cargo.toml
          cargo test --manifest-path token_contract/Cargo.toml

      - name: Build contracts
        run: npm run contracts:build

      - name: Sync wasm assets
        run: npm run wasm:sync

