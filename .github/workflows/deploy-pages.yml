name: Deploy (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  check_pages:
    name: Check Pages enabled (Actions)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
      build_type: ${{ steps.check.outputs.build_type }}

    steps:
      - name: Check Pages configuration
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const getPages = async () =>
              github.rest.repos.getPages({
                owner,
                repo,
              });

            const enablePagesForActions = async () => {
              try {
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: 'workflow',
                });
                core.notice('Enabled GitHub Pages (Source: GitHub Actions) via API.');
              } catch (e) {
                if (e?.status === 409) {
                  core.notice('GitHub Pages already exists (409).');
                  return;
                }
                throw e;
              }
            };

            const setBuildTypeWorkflow = async () => {
              await github.rest.repos.updateInformationAboutPagesSite({
                owner,
                repo,
                build_type: 'workflow',
              });
              core.notice('Updated GitHub Pages build_type to workflow via API.');
            };

            let pagesRes;
            try {
              pagesRes = await getPages();
            } catch (error) {
              if (error?.status !== 404) throw error;

              // Best-effort: enable Pages from within the workflow so deploy-pages
              // doesn't fail with a 404 on first-time setup.
              try {
                await enablePagesForActions();
                pagesRes = await getPages();
              } catch (e) {
                core.setOutput('enabled', 'false');
                core.setOutput('build_type', '');
                core.warning(
                  'GitHub Pages is not enabled for this repository, and the workflow could not enable it automatically. ' +
                  'Enable it in Settings -> Pages -> Build and deployment -> Source: GitHub Actions, then re-run this workflow.'
                );
                core.warning(`Enable attempt failed: ${e?.message ?? e}`);
                return;
              }
            }

            let buildType = pagesRes?.data?.build_type;
            core.setOutput('build_type', buildType ?? '');

            if (buildType !== 'workflow') {
              // Best-effort: switch to Actions-based Pages deployments.
              try {
                await setBuildTypeWorkflow();
                pagesRes = await getPages();
                buildType = pagesRes?.data?.build_type;
                core.setOutput('build_type', buildType ?? '');
              } catch (e) {
                core.setOutput('enabled', 'false');
                core.warning(
                  `GitHub Pages is enabled, but this workflow requires Source: GitHub Actions (build_type=${buildType ?? 'unknown'}). ` +
                  'Go to Settings -> Pages -> Build and deployment -> Source: GitHub Actions, then re-run this workflow. ' +
                  'Until then, the build/deploy jobs will be skipped to avoid a 404 from actions/deploy-pages.'
                );
                core.warning(`Update attempt failed: ${e?.message ?? e}`);
                return;
              }
            }

            if (buildType !== 'workflow') {
              core.setOutput('enabled', 'false');
              core.warning(
                `GitHub Pages is enabled, but not configured for GitHub Actions (build_type=${buildType ?? 'unknown'}). ` +
                'Go to Settings -> Pages -> Build and deployment -> Source: GitHub Actions, then re-run this workflow.'
              );
              return;
            }

            core.setOutput('enabled', 'true');
            core.notice('GitHub Pages is enabled and configured for GitHub Actions.');

  build:
    needs: check_pages
    if: needs.check_pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (Pages base path)
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
